version: '3.8'

services:
  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: trans_meilisearch
    ports:
      - "7700:7700"  # 生产环境改为 "127.0.0.1:7700:7700" 只绑定本地
    volumes:
      - meilisearch_data:/meili_data
    environment:
      - MEILI_ENV=development  # 生产环境改为 production
      # - MEILI_MASTER_KEY=your_master_key  # 生产环境取消注释并设置密钥
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  meilisearch_data:
    driver: local
