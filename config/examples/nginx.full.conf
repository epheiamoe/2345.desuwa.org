# === 完整模式 Nginx 配置 ===
# 包含 API 反向代理和速率限制
# 复制此文件并修改 {{PLACEHOLDER}}

# 速率限制区域（可选）
limit_req_zone $binary_remote_addr zone=api_limit:10m rate={{RATE_LIMIT_PER_MINUTE}}r/m;
limit_req_zone $binary_remote_addr zone=search_limit:10m rate={{SEARCH_RATE_LIMIT}}r/m;

server {
    listen 80;
    server_name {{DOMAIN}};

    root {{PROJECT_DIR}}/frontend;
    index index.php;

    # 日志配置
    access_log /var/log/nginx/{{DOMAIN}}.access.log;
    error_log /var/log/nginx/{{DOMAIN}}.error.log;

    # PHP处理
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php{{PHP_VERSION}}-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;

        # 传递环境变量给PHP
        fastcgi_param MEILISEARCH_API_KEY {{MEILI_API_KEY}};
        fastcgi_param MEILISEARCH_HOST {{MEILI_HOST}};
        fastcgi_param MEILISEARCH_PORT {{MEILI_PORT}};
    }

    # API 反向代理（完整模式）
    location /api/ {
        limit_req zone=api_limit burst=5 nodelay;

        proxy_pass http://127.0.0.1:{{FLASK_PORT}}/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时设置
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # 搜索请求速率限制
    location /search {
        limit_req zone=search_limit burst=10 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # 静态文件缓存
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1M;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 隐藏敏感文件
    location ~ /\. {
        deny all;
    }
    location ~ ^/(\.env|config\.json|docker-compose|api/\.env) {
        deny all;
    }
}
