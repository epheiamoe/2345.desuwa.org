# === 最小模式 Nginx 配置 ===
# 复制此文件并修改 {{PLACEHOLDER}}
# 然后：sudo ln -s /etc/nginx/sites-available/{{DOMAIN}} /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name {{DOMAIN}};

    root {{PROJECT_DIR}}/frontend;
    index index.php;

    # 日志配置
    access_log /var/log/nginx/{{DOMAIN}}.access.log;
    error_log /var/log/nginx/{{DOMAIN}}.error.log;

    # PHP处理
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php{{PHP_VERSION}}-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;

        # 传递环境变量给PHP
        fastcgi_param MEILISEARCH_API_KEY {{MEILI_API_KEY}};
        fastcgi_param MEILISEARCH_HOST {{MEILI_HOST}};
        fastcgi_param MEILISEARCH_PORT {{MEILI_PORT}};
    }

    # 静态文件缓存
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1M;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 隐藏敏感文件
    location ~ /\. {
        deny all;
    }
    location ~ ^/(\.env|config\.json|docker-compose) {
        deny all;
    }
}
